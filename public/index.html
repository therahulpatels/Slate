<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Slate — Your Teaching Board</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2218%22 fill=%22%231B2320%22/><path d=%22M25 65 L45 30 L55 30 L75 65%22 stroke=%22%23E8B94D%22 stroke-width=%228%22 fill=%22none%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Caveat:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2320">
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
</head>
<body>

  <!-- Top bar, present on every screen -->
  <header class="topbar">
    <button id="backBtn" class="icon-btn hidden" aria-label="Back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="brand">
      <span class="brand-mark">Slate</span>
      <span id="crumb" class="crumb"></span>
    </div>
    <div class="topbar-right">
      <button id="newBoardBtn" class="pill-btn" title="Start a blank whiteboard">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        Board
      </button>
      <span id="syncState" class="sync-state" title="Sync status">●</span>
      <button id="logoutBtn" class="icon-btn" title="Lock this site" aria-label="Lock">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M15 17l5-5-5-5M20 12H9M9 4H6a2 2 0 00-2 2v12a2 2 0 002 2h3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </header>

  <main id="app" class="app">
    <!-- Views are injected here by js/app.js -->
    <div id="foldersView" class="view hidden">
      <a id="continueCard" class="continue-card hidden" href="#">
        <span class="continue-label">Continue where you left off</span>
        <span id="continueTitle" class="continue-title"></span>
      </a>
      <div class="view-head">
        <h1 class="handwritten">Your subjects</h1>
        <p class="muted">Pick a folder to see what's inside.</p>
      </div>
      <div id="foldersGrid" class="grid"></div>
    </div>

    <div id="filesView" class="view hidden">
      <div class="view-head">
        <h1 id="filesTitle" class="handwritten"></h1>
        <p class="muted">Tap a sheet to open it on the board.</p>
      </div>
      <div id="filesGrid" class="grid files-grid"></div>
    </div>

    <div id="viewerView" class="view hidden viewer-view">
      <div id="pdfStage" class="pdf-stage"></div>

      <button id="fullscreenBtn" class="nav-btn fs-btn" aria-label="Toggle fullscreen">
        <svg id="fsIconExpand" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 9V5a1 1 0 011-1h4M20 9V5a1 1 0 00-1-1h-4M4 15v4a1 1 0 001 1h4M20 15v4a1 1 0 01-1 1h-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <svg id="fsIconCollapse" width="18" height="18" viewBox="0 0 24 24" fill="none" class="hidden"><path d="M9 4v4a1 1 0 01-1 1H4M15 4v4a1 1 0 001 1h4M9 20v-4a1 1 0 00-1-1H4M15 20v-4a1 1 0 011-1h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <div class="viewer-nav">
        <button id="prevPageBtn" class="nav-btn" aria-label="Previous page">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M6 15l6-6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span id="pageIndicator" class="page-indicator">1 / 1</span>
        <button id="nextPageBtn" class="nav-btn" aria-label="Next page">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="addWhiteboardPageBtn" class="nav-btn hidden" aria-label="Add page" title="Add a blank page">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="pen-toolbar" id="penToolbar">
        <button class="tool-btn active" data-tool="pen" aria-label="Pen">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 21l3.6-1 12-12-2.6-2.6-12 12L3 21z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
        </button>
        <button class="tool-btn" data-tool="eraser" aria-label="Eraser">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 16l7-7 7 7-4 4H9l-5-4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
        </button>
        <button class="tool-btn" data-tool="line" aria-label="Line">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 20L20 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <button class="tool-btn" data-tool="rect" aria-label="Rectangle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="6" width="16" height="12" rx="1" stroke="currentColor" stroke-width="1.8"/></svg>
        </button>
        <button class="tool-btn" data-tool="ellipse" aria-label="Circle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="12" rx="8" ry="6" stroke="currentColor" stroke-width="1.8"/></svg>
        </button>
        <button class="tool-btn" data-tool="arrow" aria-label="Arrow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 20L20 4M20 4h-7M20 4v7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="swatches">
          <button class="swatch active" data-color="#E8B94D" style="background:#E8B94D"></button>
          <button class="swatch" data-color="#F1EFE7" style="background:#F1EFE7"></button>
          <button class="swatch" data-color="#5FB3A3" style="background:#5FB3A3"></button>
          <button class="swatch" data-color="#E36B5C" style="background:#E36B5C"></button>
        </div>
        <input id="thicknessRange" type="range" min="1" max="14" value="3">
        <button id="undoBtn" class="tool-btn" aria-label="Undo" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 7L4 12l5 5M4 12h11a5 5 0 010 10h-1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="redoBtn" class="tool-btn" aria-label="Redo" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 7l5 5-5 5M20 12H9a5 5 0 000 10h1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="clearPageBtn" class="tool-btn" aria-label="Clear page">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="toggleDrawBtn" class="tool-btn tool-btn-toggle" aria-label="Toggle drawing mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5v14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div id="emptyState" class="view hidden">
      <div class="empty-card">
        <p id="emptyMessage" class="handwritten">Nothing here yet.</p>
      </div>
    </div>
  </main>

  <script src="js/drive.js"></script>
  <script src="js/drawing-engine.js"></script>
  <script src="js/pdf-viewer.js"></script>
  <script src="js/whiteboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
